# =============================================================================
# Inventory — 多节点
# 每个 host 通过 deployment_env 映射 messup-private 中的配置目录：
#   deployment_env=rear
#     → private-config/singbox/rear/config.json
#     → private-config/smartdns/rear/smartdns.conf
# =============================================================================

[lxc_nodes]
# 格式: <IP> ansible_port=<端口> deployment_env=<环境名>
172.245.220.230 ansible_port=29586 deployment_env=rear

# 多节点示例（取消注释并填写）:
# 192.168.1.20 ansible_port=22 deployment_env=node-a
# 10.0.0.30    ansible_port=22 deployment_env=node-b

[kvm_nodes]
# 预留：非 LXC 节点可放这里（当前 playbook 默认只部署 lxc_nodes）
# 192.168.1.10 ansible_port=22 deployment_env=kvm-a

[all_nodes:children]
lxc_nodes
kvm_nodes

[all_nodes:vars]
ansible_user=root
# Alpine root 直连，不需要 sudo
ansible_become=false
ansible_python_interpreter=auto_silent
# 本地部署私钥路径；CI 由 workflow --private-key 覆盖
ansible_ssh_private_key_file=~/.ssh/id_ed25519_github
