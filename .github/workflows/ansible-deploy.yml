name: Ansible Deploy

# 触发来源:
# 1) push main          → 本仓 playbook / inventory / 版本变更
# 2) repository_dispatch → 私有仓配置变更 (private-config-updated)
# 3) workflow_dispatch  → 手动部署（可指定 limit / tags）
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  repository_dispatch:
    types: [private-config-updated]
  workflow_dispatch:
    inputs:
      limit:
        description: "可选：限制目标 host（inventory 中的 host/IP），留空=全部"
        required: false
        default: ""
      tags:
        description: "可选：Ansible tags（bootstrap_ssh,bootstrap,smartdns,singbox,nft），留空=自动/全部"
        required: false
        default: ""

concurrency:
  group: ansible-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to LXC nodes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout public playbooks (messup)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 公私钥统一使用 id_ed25519_github：
      # - Secret ANSIBLE_SSH_KEY = 该私钥全文
      # - 同时用于：checkout messup-private（Deploy Key）+ SSH 登录 LXC
      - name: Require ANSIBLE_SSH_KEY
        run: |
          if [ -z "${{ secrets.ANSIBLE_SSH_KEY }}" ]; then
            echo "::error::缺少 Secret ANSIBLE_SSH_KEY（~/.ssh/id_ed25519_github 私钥全文）"
            echo "同一把密钥需：1) 加到各 LXC authorized_keys  2) 加到 messup-private Deploy keys"
            exit 1
          fi

      - name: Checkout private configs (messup-private)
        uses: actions/checkout@v4
        with:
          repository: dyq94310/messup-private
          ssh-key: ${{ secrets.ANSIBLE_SSH_KEY }}
          path: private-config
          ref: main

      - name: List private config tree
        run: |
          echo "== private-config =="
          find private-config -type f ! -path '*/.git/*' | sort || true
          test -d private-config/singbox || {
            echo "::error::private-config/singbox 不存在；检查 id_ed25519_github 是否已加入 messup-private Deploy keys"
            exit 1
          }
          test -f private-config/smartdns/smartdns.conf || {
            echo "::error::private-config/smartdns/smartdns.conf 不存在（全局共用配置）"
            exit 1
          }

      - name: Detect deploy tags (对应服务)
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAGS: ${{ github.event.inputs.tags }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          DISPATCH_TAGS: ${{ github.event.client_payload.tags }}
          DISPATCH_LIMIT: ${{ github.event.client_payload.limit }}
        run: |
          set -euo pipefail
          TAGS=""
          LIMIT=""

          # 1) 手动 / dispatch 显式指定优先
          if [ -n "${INPUT_TAGS:-}" ]; then
            TAGS="$INPUT_TAGS"
          elif [ -n "${DISPATCH_TAGS:-}" ]; then
            TAGS="$DISPATCH_TAGS"
          fi

          if [ -n "${INPUT_LIMIT:-}" ]; then
            LIMIT="$INPUT_LIMIT"
          elif [ -n "${DISPATCH_LIMIT:-}" ]; then
            LIMIT="$DISPATCH_LIMIT"
          fi

          # 2) 本仓 push：按变更路径推断 tags
          if [ -z "$TAGS" ] && [ "$EVENT_NAME" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            echo "Changed files (push):"
            echo "$CHANGED"
              NEED_SB=0
              NEED_SD=0
              NEED_NFT=0
              NEED_ALL=0
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                case "$f" in
                  playbooks/01-deploy-singbox.yml|templates/singbox.openrc.j2|templates/singbox.service.j2)
                    NEED_SB=1 ;;
                  playbooks/02-deploy-smartdns.yml|templates/smartdns.openrc.j2|templates/smartdns.service.j2)
                    NEED_SD=1 ;;
                  playbooks/03-deploy-nft.yml|templates/messup-nft.openrc.j2|templates/messup-nft.service.j2|templates/messup-nft.env.j2)
                    NEED_NFT=1 ;;
                  playbooks/site.yml|playbooks/00-bootstrap-ssh.yml|playbooks/00-bootstrap-python.yml|ansible.cfg|.github/workflows/*)
                    NEED_ALL=1 ;;
                  *)
                    # 其他代码变更默认全量
                    NEED_ALL=1 ;;
                esac
              done <<< "$CHANGED"

              if [ "$NEED_ALL" = "1" ]; then
                TAGS=""
              else
                parts=()
                [ "$NEED_SB" = "1" ] && parts+=("singbox")
                [ "$NEED_SD" = "1" ] && parts+=("smartdns")
                [ "$NEED_NFT" = "1" ] && parts+=("nft")
                if [ ${#parts[@]} -gt 0 ]; then
                  TAGS=$(IFS=,; echo "${parts[*]}")
                fi
              fi
          fi

          EXTRA=""
          if [ -n "${LIMIT:-}" ]; then
            EXTRA="$EXTRA --limit ${LIMIT}"
          fi
          if [ -n "${TAGS:-}" ]; then
            EXTRA="$EXTRA --tags ${TAGS}"
          fi

          echo "extra=${EXTRA}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS:-<all>}" >> "$GITHUB_OUTPUT"
          echo "limit=${LIMIT:-<all>}" >> "$GITHUB_OUTPUT"
          {
            echo "### Deploy scope"
            echo "- event: \`${EVENT_NAME}\`"
            echo "- tags: \`${TAGS:-all (bootstrap + smartdns + singbox)}\`"
            echo "- limit: \`${LIMIT:-all hosts}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup SSH for Ansible → LXC (same id_ed25519_github)
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # 与 checkout private 使用同一把私钥（id_ed25519_github）
          printf '%s\n' "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/id_ed25519_github
          chmod 600 ~/.ssh/id_ed25519_github
          ssh-keygen -y -f ~/.ssh/id_ed25519_github >/dev/null || {
            echo "::error::ANSIBLE_SSH_KEY 不是有效私钥（应为 id_ed25519_github 私钥全文）"
            exit 1
          }
          cat > ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/id_ed25519_github
            IdentitiesOnly yes
            ServerAliveInterval 30
            ServerAliveCountMax 6
          EOF
          sed -i 's/^[[:space:]]*//' ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Install Ansible + sshpass
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ansible sshpass
          ansible --version
          # 密码 bootstrap 依赖 sshpass；GitHub runner 默认不带，必须装上并校验
          if ! command -v sshpass >/dev/null 2>&1; then
            echo "::error::sshpass 安装后仍不可用，bootstrap_password 将失败"
            exit 1
          fi
          sshpass -V 2>&1 || true
          echo "sshpass: $(command -v sshpass)"

      # 新机：inventory 的 bootstrap_password 在此装公钥（密钥优先）。须在连通性预检之前。
      - name: Bootstrap SSH (key or bootstrap_password)
        id: ssh_bootstrap
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_FORCE_COLOR: "1"
          # 避免 ansible.cfg 的 ControlMaster 与密码会话串扰
          ANSIBLE_SSH_ARGS: "-o ControlMaster=no -o ControlPath=none -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        run: |
          set -euo pipefail
          LIMIT="${{ steps.detect.outputs.limit }}"
          EXTRA=""
          if [ -n "${LIMIT}" ] && [ "${LIMIT}" != "<all>" ]; then
            EXTRA="--limit ${LIMIT}"
          fi

          # 是否有主机声明了 bootstrap_password（需要密码装钥必须成功）
          NEED_PW=0
          if grep -E '[[:space:]]bootstrap_password=' private-config/inventory/inventory.ini \
            | grep -vE '^[[:space:]]*#' >/dev/null 2>&1; then
            NEED_PW=1
            echo "Detected bootstrap_password in inventory → password install required"
          fi

          echo "pubkey fingerprint (from ANSIBLE_SSH_KEY):"
          ssh-keygen -y -f ~/.ssh/id_ed25519_github | ssh-keygen -lf - || true

          echo "Running: ansible-playbook playbooks/00-bootstrap-ssh.yml ${EXTRA:-}"
          set +e
          # shellcheck disable=SC2086
          ansible-playbook \
            -i private-config/inventory/inventory.ini \
            playbooks/00-bootstrap-ssh.yml \
            --private-key ~/.ssh/id_ed25519_github \
            -e "private_config_temp=${GITHUB_WORKSPACE}/private-config" \
            ${EXTRA}
          rc=$?
          set -e
          echo "bootstrap_rc=${rc}" >> "$GITHUB_OUTPUT"

          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          if [ "$rc" -eq 3 ] && [ "$NEED_PW" -eq 0 ]; then
            echo "::warning::SSH bootstrap 部分不可达 (rc=3)，无 bootstrap_password 需求，继续"
            exit 0
          fi
          # 有 bootstrap_password 时装钥失败必须中止，否则会静默跳过新机
          if [ "$NEED_PW" -eq 1 ]; then
            echo "::error::SSH bootstrap 失败 (rc=${rc}) 且 inventory 含 bootstrap_password；公钥未可靠注入，中止部署"
            exit "$rc"
          fi
          echo "::warning::SSH bootstrap 非零退出 (${rc})，继续对密钥可达主机部署"
          exit 0

      # 裸 Alpine 无 Python：不能用 ping 模块；用 raw + 不可达只警告
      - name: SSH connectivity check (raw, no Python required)
        id: conn
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          PRIVATE_KEY: /home/runner/.ssh/id_ed25519_github
          LIMIT: ${{ steps.detect.outputs.limit }}
          # 与 bootstrap 一致，避免 ansible.cfg ControlMaster / 多钥串扰
          ANSIBLE_SSH_ARGS: "-o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o ControlMaster=no -o ControlPath=none -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=12"
        run: |
          set -euo pipefail
          export PRIVATE_KEY="${HOME}/.ssh/id_ed25519_github"
          chmod +x scripts/check-connectivity.sh
          ./scripts/check-connectivity.sh

      - name: Run site playbook
        id: play
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_SSH_ARGS: "-o IdentitiesOnly=yes -o ControlMaster=no -o ControlPath=none -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        run: |
          set -euo pipefail
          EXTRA="${{ steps.detect.outputs.extra }}"
          REACH_LIMIT="${{ steps.conn.outputs.reachable_limit }}"

          # 部分主机不可达：去掉原有 --limit，改为仅可达主机（避免双重 --limit）
          if [ -n "${REACH_LIMIT}" ]; then
            # shellcheck disable=SC2001
            EXTRA="$(echo " ${EXTRA} " | sed -E 's/ --limit [^ ]+//g' | sed -E 's/^ +| +$//g')"
            EXTRA="${EXTRA} --limit ${REACH_LIMIT}"
            echo "⚠️  仅部署可达主机: ${REACH_LIMIT}"
          fi

          echo "Running: ansible-playbook playbooks/site.yml ${EXTRA:-}"
          set +e
          # shellcheck disable=SC2086
          ansible-playbook \
            -i private-config/inventory/inventory.ini \
            playbooks/site.yml \
            --private-key ~/.ssh/id_ed25519_github \
            -e "private_config_temp=${GITHUB_WORKSPACE}/private-config" \
            ${EXTRA}
          rc=$?
          set -e

          # Ansible 退出码: 0 OK | 2 主机任务失败 | 3 不可达 | 4 解析错误 ...
          # ignore_unreachable 后一般不会因不可达返回 3；若仍出现则视为警告成功
          if [ "$rc" -eq 0 ]; then
            echo "playbook_rc=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$rc" -eq 3 ]; then
            echo "::warning::部分主机不可达 (ansible exit 3)，其余主机已处理；不视为流水线失败"
            echo "playbook_rc=3" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "playbook_rc=${rc}" >> "$GITHUB_OUTPUT"
          echo "::error::ansible-playbook 失败，退出码 ${rc}（非单纯不可达）。检查任务错误日志。"
          exit "$rc"

      - name: Deploy finished
        if: success()
        run: |
          echo "✅ Ansible deploy finished"
          echo "Trigger: ${{ github.event_name }}"
          echo "Tags: ${{ steps.detect.outputs.tags }}"
          echo "Limit: ${{ steps.detect.outputs.limit }}"
          echo "Unreachable skipped: ${{ steps.conn.outputs.unreachable_hosts }}"
          {
            echo ""
            echo "### Result"
            echo "✅ finished (unreachable hosts are warnings only, not hard fail)"
            if [ -n "${{ steps.conn.outputs.unreachable_hosts }}" ]; then
              echo ""
              echo "⚠️ Skipped unreachable: \`${{ steps.conn.outputs.unreachable_hosts }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy failed
        if: failure()
        run: |
          echo "::error::Ansible deploy failed. 若全部主机不可达：检查密钥/端口；若单机任务失败：查看 playbook 日志。"
          {
            echo ""
            echo "### Result"
            echo "❌ failed"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
