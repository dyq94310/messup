---
# 全局默认变量（可被 inventory host/group vars 覆盖）

# ---------- Sing-box ----------
singbox_version: "1.13.14"
singbox_install_dir: "/etc/s-box"
singbox_bin: "{{ singbox_install_dir }}/sing-box"
singbox_config: "{{ singbox_install_dir }}/config.json"
singbox_service: "singbox"

# ---------- SmartDNS ----------
# 对应 release tag: Release{{ smartdns_version }}
# 包名: smartdns-{{ smartdns_version }}.{{ arch }}-linux-all.tar.gz
smartdns_version: "46.1"
smartdns_install_dir: "/etc/smartdns"
smartdns_bin: "/usr/sbin/smartdns"
smartdns_config: "{{ smartdns_install_dir }}/smartdns.conf"
smartdns_service: "smartdns"

# 私有配置在 control node 上的路径
# - 本地: messup 根目录下
#     ln -sfn ../messup-private private-config
#   则 playbook_dir/../private-config → messup/private-config
# - CI: workflow 用 -e private_config_temp=$GITHUB_WORKSPACE/private-config 覆盖
private_config_temp: "{{ playbook_dir }}/../private-config"
