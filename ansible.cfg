[defaults]
inventory = inventory/inventory.ini
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
# Alpine 最小化镜像常用 auto_silent；模块失败时会回退探测
interpreter_python = auto_silent
timeout = 30
gathering = smart
fact_caching = memory
forks = 10
display_skipped_hosts = false

[privilege_escalation]
# 目标机默认 root 登录，无需 become；若改用普通用户可在 inventory 覆盖
become = False
become_method = su
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6
