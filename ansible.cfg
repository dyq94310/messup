[defaults]
# 主机清单在私有仓 messup-private（本地软链 / CI checkout → private-config）
inventory = private-config/inventory/inventory.ini
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = ansible.builtin.default
callback_result_format = yaml
# Alpine 最小化镜像常用 auto_silent；模块失败时会回退探测
# 与 inventory 一致；bootstrap 装完后也会 set_fact 钉死真实路径
interpreter_python = /usr/bin/python3
# SSH/模块超时；不可达主机尽快跳过，避免拖死整批
timeout = 20
gathering = smart
fact_caching = memory
forks = 10
display_skipped_hosts = false
# 单机任务失败不拖死其他主机（默认即 false，显式写出）
any_errors_fatal = False

[privilege_escalation]
# 目标机默认 root 登录，无需 become；若改用普通用户可在 inventory 覆盖
become = False
become_method = su
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
# ConnectTimeout：IP 不通时尽快失败并继续下一台
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o ConnectTimeout=12
