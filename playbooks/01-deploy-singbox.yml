---
# 部署 / 更新 Sing-box（二进制 + OpenRC + 按节点私有配置）
- name: Deploy sing-box on Alpine LXC
  hosts: lxc_nodes
  become: false
  gather_facts: true
  # 某台不可达只跳过该主机，不中止整批部署
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [singbox, proxy]

  pre_tasks:
    - name: Require deployment_env
      assert:
        that:
          - deployment_env is defined
          - deployment_env | length > 0
        fail_msg: >-
          ❌ Host {{ inventory_hostname }} 缺少 deployment_env。
          请在 inventory 中设置，例如: deployment_env=rear
        success_msg: "deployment_env={{ deployment_env }}"

    - name: Resolve private config path
      set_fact:
        _singbox_cfg_src: "{{ private_config_temp }}/singbox/{{ deployment_env }}/config.json"

    - name: Ensure private config exists on control node
      stat:
        path: "{{ _singbox_cfg_src }}"
      delegate_to: localhost
      become: false
      register: _cfg_stat

    - name: Fail if private config missing
      assert:
        that:
          - _cfg_stat.stat.exists
          - _cfg_stat.stat.isreg
        fail_msg: >-
          ❌ 找不到节点配置: {{ _singbox_cfg_src }}
          请确认:
            1) messup-private 已 checkout / 软链到 private-config
            2) 存在 singbox/{{ deployment_env }}/config.json
            3) inventory 中 deployment_env 与目录名一致
            4) CI 是否设置 -e private_config_temp=...

  tasks:
    - name: Fail if not Alpine (apk missing)
      fail:
        msg: "❌ {{ inventory_hostname }} 不是 Alpine（未找到 apk）。当前方案仅支持 Alpine LXC。"
      when: ansible_pkg_mgr is defined and ansible_pkg_mgr != 'apk'

    - name: Install runtime dependencies (Alpine)
      apk:
        name:
          - curl
          - tar
          - ca-certificates
          - openrc
        state: present
        update_cache: true

    - name: Detect CPU architecture (sing-box release naming)
      set_fact:
        target_arch: >-
          {{
            'amd64' if ansible_architecture in ['x86_64', 'amd64'] else
            'arm64' if ansible_architecture in ['aarch64', 'arm64'] else
            'armv7' if ansible_architecture in ['armv7l', 'armv7'] else
            'unknown'
          }}
        # Alpine = musl；避免默认 glibc 包在 Alpine 上出现 "not found"(exit 127)
        singbox_libc: >-
          {{
            'musl' if (ansible_os_family | default('') == 'Alpine' or ansible_pkg_mgr | default('') == 'apk')
            else 'glibc'
          }}

    - name: Fail on unknown architecture
      fail:
        msg: >-
          ❌ 不支持的架构: {{ ansible_architecture }}
          支持: x86_64/amd64 → amd64, aarch64/arm64 → arm64, armv7l → armv7
      when: target_arch == 'unknown'

    - name: Show target architecture
      debug:
        msg: "Host {{ inventory_hostname }} arch={{ ansible_architecture }} libc={{ singbox_libc }} → {{ target_arch }}"

    - name: Ensure install directory
      file:
        path: "{{ singbox_install_dir }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Check currently installed sing-box version
      command: "{{ singbox_bin }} version"
      register: _installed_ver
      changed_when: false
      failed_when: false

    - name: Decide whether binary reinstall is needed
      set_fact:
        _need_bin_install: >-
          {{
            (_installed_ver.rc | default(1) != 0) or
            (singbox_version not in (_installed_ver.stdout | default('')))
          }}

    - name: Download sing-box release
      get_url:
        url: >-
          https://github.com/SagerNet/sing-box/releases/download/v{{ singbox_version }}/sing-box-{{ singbox_version }}-linux-{{ target_arch }}-{{ singbox_libc }}.tar.gz
        dest: "/tmp/sing-box-{{ singbox_version }}-{{ target_arch }}-{{ singbox_libc }}.tar.gz"
        mode: "0644"
        force: true
        timeout: 120
      register: _dl
      retries: 3
      delay: 5
      until: _dl is succeeded
      when: _need_bin_install | bool

    - name: Extract sing-box binary
      unarchive:
        src: "/tmp/sing-box-{{ singbox_version }}-{{ target_arch }}-{{ singbox_libc }}.tar.gz"
        dest: "{{ singbox_install_dir }}"
        remote_src: true
        extra_opts: ["--strip-components=1"]
      when: _need_bin_install | bool
      notify: Restart singbox

    - name: Ensure binary executable
      file:
        path: "{{ singbox_bin }}"
        mode: "0755"
        owner: root
        group: root
      register: _bin_mode

    - name: Fail if binary still missing
      stat:
        path: "{{ singbox_bin }}"
      register: _bin_stat

    - name: Assert sing-box binary present
      assert:
        that:
          - _bin_stat.stat.exists
          - _bin_stat.stat.executable
        fail_msg: "❌ sing-box 二进制不存在或不可执行: {{ singbox_bin }}"

    - name: Deploy node-specific config from private repo
      copy:
        src: "{{ _singbox_cfg_src }}"
        dest: "{{ singbox_config }}"
        mode: "0600"
        owner: root
        group: root
        backup: true
      notify: Restart singbox

    - name: Validate config with sing-box check
      command: "{{ singbox_bin }} check -c {{ singbox_config }}"
      register: _check
      changed_when: false
      failed_when: false

    - name: Fail if config check failed
      fail:
        msg: >-
          ❌ sing-box 配置校验失败 ({{ singbox_config }})
          源文件: {{ _singbox_cfg_src }}
          输出:
          {{ _check.stdout | default('') }}
          {{ _check.stderr | default('') }}
      when: _check.rc != 0

    - name: Deploy OpenRC service unit
      template:
        src: "{{ playbook_dir }}/../templates/singbox.openrc.j2"
        dest: "/etc/init.d/{{ singbox_service }}"
        mode: "0755"
        owner: root
        group: root
      notify: Restart singbox

    - name: Enable singbox at default runlevel
      service:
        name: "{{ singbox_service }}"
        enabled: true
        runlevel: default

    - name: Ensure singbox is started
      service:
        name: "{{ singbox_service }}"
        state: started

    - name: Cleanup download archive
      file:
        path: "/tmp/sing-box-{{ singbox_version }}-{{ target_arch }}-{{ singbox_libc }}.tar.gz"
        state: absent
      when: _need_bin_install | bool

    - name: Read installed version
      command: "{{ singbox_bin }} version"
      register: version_out
      changed_when: false
      failed_when: false

    - name: Check service status
      command: "rc-service {{ singbox_service }} status"
      register: _svc_status
      changed_when: false
      failed_when: false

    - name: Deployment summary
      debug:
        msg:
          - "✅ sing-box deployed"
          - "  host:     {{ inventory_hostname }}"
          - "  env:      {{ deployment_env }}"
          - "  version:  {{ singbox_version }}"
          - "  arch:     {{ target_arch }}"
          - "  binary:   {{ singbox_bin }}"
          - "  config:   {{ singbox_config }}"
          - "  detail:   {{ version_out.stdout_lines | default(['n/a']) | first }}"
          - "  service:  {{ _svc_status.stdout | default('n/a') | trim }}"

  handlers:
    - name: Restart singbox
      service:
        name: "{{ singbox_service }}"
        state: restarted
