---
# 部署 / 更新 Sing-box（二进制 + OpenRC/systemd + 按节点私有配置）
# 支持 Alpine (OpenRC/musl) 与 Debian/Ubuntu (systemd/glibc)
- name: Deploy sing-box on LXC
  hosts: lxc_nodes
  become: false
  gather_facts: true
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [singbox, proxy]

  pre_tasks:
    - name: Require deployment_env
      assert:
        that:
          - deployment_env is defined
          - deployment_env | length > 0
        fail_msg: >-
          ❌ Host {{ inventory_hostname }} 缺少 deployment_env。
          请在 inventory 中设置，例如: deployment_env=rear
        success_msg: "deployment_env={{ deployment_env }}"

    - name: Resolve private config path
      set_fact:
        _singbox_cfg_src: "{{ private_config_temp }}/singbox/{{ deployment_env }}/config.json"

    - name: Ensure private config exists on control node
      stat:
        path: "{{ _singbox_cfg_src }}"
      delegate_to: localhost
      become: false
      register: _cfg_stat

    - name: Fail if private config missing
      assert:
        that:
          - _cfg_stat.stat.exists
          - _cfg_stat.stat.isreg
        fail_msg: >-
          ❌ 找不到节点配置: {{ _singbox_cfg_src }}
          请确认:
            1) messup-private 已 checkout / 软链到 private-config
            2) 存在 singbox/{{ deployment_env }}/config.json
            3) inventory 中 deployment_env 与目录名一致
            4) CI 是否设置 -e private_config_temp=...

  tasks:
    - name: Detect package manager
      raw: |
        if command -v apk >/dev/null 2>&1; then
          echo alpine
        elif command -v apt-get >/dev/null 2>&1; then
          echo debian
        else
          echo unknown
        fi
      args:
        executable: /bin/sh
      register: _pkg_mgr_detected
      changed_when: false
      failed_when: false

    - name: Detect OS / init
      set_fact:
        _is_alpine: "{{ (_pkg_mgr_detected.stdout | default('') | trim) == 'alpine' }}"
        _is_debian: "{{ (_pkg_mgr_detected.stdout | default('') | trim) == 'debian' }}"

    - name: Resolve init system
      set_fact:
        _init: "{{ 'openrc' if (_is_alpine | bool) else ('systemd' if (_is_debian | bool) else 'unknown') }}"

    - name: Fail on unsupported OS
      fail:
        msg: >-
          ❌ {{ inventory_hostname }} 不支持的系统（需要 Alpine 或 Debian/Ubuntu）。
          os_family={{ ansible_os_family | default('?') }} pkg_mgr={{ ansible_pkg_mgr | default('?') }}
      when: _init == 'unknown'

    - name: Install runtime dependencies (Alpine)
      apk:
        name:
          - curl
          - tar
          - ca-certificates
          - openrc
        state: present
        update_cache: true
      when: _is_alpine | bool

    - name: Ensure apt module dependencies (Debian)
      raw: |
        set -e
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt ca-certificates
      args:
        executable: /bin/sh
      when: _is_debian | bool
      changed_when: false

    - name: Install runtime dependencies (Debian)
      apt:
        name:
          - curl
          - tar
          - ca-certificates
        state: present
        update_cache: true
      when: _is_debian | bool

    - name: Detect CPU architecture (sing-box release naming)
      set_fact:
        target_arch: >-
          {{
            'amd64' if ansible_architecture in ['x86_64', 'amd64'] else
            'arm64' if ansible_architecture in ['aarch64', 'arm64'] else
            'armv7' if ansible_architecture in ['armv7l', 'armv7'] else
            'unknown'
          }}
        # Alpine = musl；Debian/Ubuntu = glibc
        singbox_libc: "{{ 'musl' if (_is_alpine | bool) else 'glibc' }}"

    - name: Fail on unknown architecture
      fail:
        msg: >-
          ❌ 不支持的架构: {{ ansible_architecture }}
          支持: x86_64/amd64 → amd64, aarch64/arm64 → arm64, armv7l → armv7
      when: target_arch == 'unknown'

    - name: Show target architecture
      debug:
        msg: >-
          Host {{ inventory_hostname }} os={{ ansible_os_family | default('?') }}
          init={{ _init }} arch={{ ansible_architecture }}
          libc={{ singbox_libc }} → {{ target_arch }}

    - name: Ensure install directory
      file:
        path: "{{ singbox_install_dir }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Check currently installed sing-box version
      command: "{{ singbox_bin }} version"
      register: _installed_ver
      changed_when: false
      failed_when: false

    - name: Decide whether binary reinstall is needed
      set_fact:
        _need_bin_install: >-
          {{
            (_installed_ver.rc | default(1) != 0) or
            (singbox_version not in (_installed_ver.stdout | default('')))
          }}

    - name: Download sing-box release
      get_url:
        url: >-
          https://github.com/SagerNet/sing-box/releases/download/v{{ singbox_version }}/sing-box-{{ singbox_version }}-linux-{{ target_arch }}-{{ singbox_libc }}.tar.gz
        dest: "/tmp/sing-box-{{ singbox_version }}-{{ target_arch }}-{{ singbox_libc }}.tar.gz"
        mode: "0644"
        force: true
        timeout: 120
      register: _dl
      retries: 3
      delay: 5
      until: _dl is succeeded
      when: _need_bin_install | bool

    - name: Extract sing-box binary
      unarchive:
        src: "/tmp/sing-box-{{ singbox_version }}-{{ target_arch }}-{{ singbox_libc }}.tar.gz"
        dest: "{{ singbox_install_dir }}"
        remote_src: true
        extra_opts: ["--strip-components=1"]
      when: _need_bin_install | bool
      notify: Restart singbox

    - name: Ensure binary executable
      file:
        path: "{{ singbox_bin }}"
        mode: "0755"
        owner: root
        group: root
      register: _bin_mode

    - name: Fail if binary still missing
      stat:
        path: "{{ singbox_bin }}"
      register: _bin_stat

    - name: Assert sing-box binary present
      assert:
        that:
          - _bin_stat.stat.exists
          - _bin_stat.stat.executable
        fail_msg: "❌ sing-box 二进制不存在或不可执行: {{ singbox_bin }}"

    - name: Deploy node-specific config from private repo
      copy:
        src: "{{ _singbox_cfg_src }}"
        dest: "{{ singbox_config }}"
        mode: "0600"
        owner: root
        group: root
        backup: true
      notify: Restart singbox

    - name: Collect configured sing-box certificate source hosts
      set_fact:
        _singbox_cert_source_hosts: "{{ (_singbox_cert_source_hosts | default([])) + [item] }}"
      loop: "{{ groups['lxc_nodes'] | default([]) }}"
      when: hostvars[item].singbox_cert_source | default(false) | bool

    - name: Require exactly one sing-box certificate source host
      assert:
        that:
          - (_singbox_cert_source_hosts | default([]) | length) == 1
        fail_msg: >-
          ❌ 必须在 inventory 的 lxc_nodes 中用 singbox_cert_source=true 标记且只标记一台证书源节点。
          当前匹配: {{ _singbox_cert_source_hosts | default([]) }}

    - name: Resolve sing-box certificate source host
      set_fact:
        _singbox_cert_source_host: "{{ _singbox_cert_source_hosts[0] }}"

    - name: Check local sing-box certificate directory
      shell: |
        set -eu
        if [ ! -d "{{ singbox_cert_dir }}" ]; then
          exit 1
        fi
        cert_count=$(find "{{ singbox_cert_dir }}" -type f \( -name '*.crt' -o -name '*.cer' -o -name '*.pem' \) -exec test -s {} \; -print 2>/dev/null | wc -l)
        key_count=$(find "{{ singbox_cert_dir }}" -type f \( -name '*.key' -o -name '*key*.pem' \) -exec test -s {} \; -print 2>/dev/null | wc -l)
        test "$cert_count" -gt 0
        test "$key_count" -gt 0
      args:
        executable: /bin/sh
      register: _local_cert_dir_check
      changed_when: false
      failed_when: false

    - name: Check source sing-box certificate directory before sync
      shell: |
        set -eu
        if [ ! -d "{{ singbox_cert_dir }}" ]; then
          exit 1
        fi
        cert_count=$(find "{{ singbox_cert_dir }}" -type f \( -name '*.crt' -o -name '*.cer' -o -name '*.pem' \) -exec test -s {} \; -print 2>/dev/null | wc -l)
        key_count=$(find "{{ singbox_cert_dir }}" -type f \( -name '*.key' -o -name '*key*.pem' \) -exec test -s {} \; -print 2>/dev/null | wc -l)
        test "$cert_count" -gt 0
        test "$key_count" -gt 0
      args:
        executable: /bin/sh
      register: _source_cert_dir_check
      changed_when: false
      failed_when: false
      delegate_to: "{{ _singbox_cert_source_host }}"
      when: _local_cert_dir_check.rc != 0

    - name: Fail if local certificate directory is missing and source has no certificates
      fail:
        msg: >-
          ❌ {{ inventory_hostname }} 缺少 sing-box 证书目录 {{ singbox_cert_dir }}，
          且源节点 {{ _singbox_cert_source_host }} 的同名目录不存在，或没有同时包含证书文件与私钥文件。
          已中止，避免 sing-box 启动时反复触发 ACME。
      when:
        - _local_cert_dir_check.rc != 0
        - _source_cert_dir_check.rc != 0

    - name: Prepare local certificate cache directory
      file:
        path: "{{ _singbox_cert_cache_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      when: _local_cert_dir_check.rc != 0

    - name: Create certificate archive on source host
      shell: |
        set -eu
        rm -f "{{ _singbox_cert_remote_archive }}"
        tar -C "{{ singbox_cert_dir }}" -czf "{{ _singbox_cert_remote_archive }}" .
      args:
        executable: /bin/sh
      changed_when: true
      delegate_to: "{{ _singbox_cert_source_host }}"
      when: _local_cert_dir_check.rc != 0

    - name: Fetch certificate archive to control node
      fetch:
        src: "{{ _singbox_cert_remote_archive }}"
        dest: "{{ _singbox_cert_local_archive }}"
        flat: true
      delegate_to: "{{ _singbox_cert_source_host }}"
      when: _local_cert_dir_check.rc != 0

    - name: Clear invalid local certificate directory before mirror restore
      file:
        path: "{{ singbox_cert_dir }}"
        state: absent
      when: _local_cert_dir_check.rc != 0

    - name: Recreate local certificate directory before mirror restore
      file:
        path: "{{ singbox_cert_dir }}"
        state: directory
        mode: "0700"
        owner: root
        group: root
      when: _local_cert_dir_check.rc != 0

    - name: Mirror certificate directory from source archive
      unarchive:
        src: "{{ _singbox_cert_local_archive }}"
        dest: "{{ singbox_cert_dir }}"
        remote_src: false
        owner: root
        group: root
      when: _local_cert_dir_check.rc != 0
      notify: Restart singbox

    - name: Verify mirrored certificate directory
      shell: |
        set -eu
        cert_count=$(find "{{ singbox_cert_dir }}" -type f \( -name '*.crt' -o -name '*.cer' -o -name '*.pem' \) -exec test -s {} \; -print 2>/dev/null | wc -l)
        key_count=$(find "{{ singbox_cert_dir }}" -type f \( -name '*.key' -o -name '*key*.pem' \) -exec test -s {} \; -print 2>/dev/null | wc -l)
        test "$cert_count" -gt 0
        test "$key_count" -gt 0
      args:
        executable: /bin/sh
      register: _mirrored_cert_dir_check
      changed_when: false
      when: _local_cert_dir_check.rc != 0

    - name: Remove source certificate archive
      file:
        path: "{{ _singbox_cert_remote_archive }}"
        state: absent
      delegate_to: "{{ _singbox_cert_source_host }}"
      changed_when: false
      when: _local_cert_dir_check.rc != 0

    - name: Remove local certificate archive cache
      file:
        path: "{{ _singbox_cert_cache_dir }}"
        state: absent
      delegate_to: localhost
      become: false
      changed_when: false
      when: _local_cert_dir_check.rc != 0

    - name: Validate config with sing-box check
      command: "{{ singbox_bin }} check -c {{ singbox_config }}"
      register: _check
      changed_when: false
      failed_when: false

    - name: Fail if config check failed
      fail:
        msg: >-
          ❌ sing-box 配置校验失败 ({{ singbox_config }})
          源文件: {{ _singbox_cfg_src }}
          输出:
          {{ _check.stdout | default('') }}
          {{ _check.stderr | default('') }}
      when: _check.rc != 0

    - name: Deploy OpenRC service unit
      template:
        src: "{{ playbook_dir }}/../templates/singbox.openrc.j2"
        dest: "/etc/init.d/{{ singbox_service }}"
        mode: "0755"
        owner: root
        group: root
      notify: Restart singbox
      when: _init == 'openrc'

    - name: Deploy systemd service unit
      template:
        src: "{{ playbook_dir }}/../templates/singbox.service.j2"
        dest: "/etc/systemd/system/{{ singbox_service }}.service"
        mode: "0644"
        owner: root
        group: root
      notify: Restart singbox
      when: _init == 'systemd'
      register: _sb_unit_sys

    - name: Reload systemd after unit change
      systemd:
        daemon_reload: true
      when: _init == 'systemd' and (_sb_unit_sys is defined and _sb_unit_sys is changed)

    - name: Enable singbox (OpenRC default runlevel)
      command: "rc-update add {{ singbox_service }} default"
      register: _openrc_enable
      changed_when: "'already installed' not in (_openrc_enable.stdout | default(''))"
      when: _init == 'openrc'

    - name: Enable singbox (systemd)
      service:
        name: "{{ singbox_service }}"
        enabled: true
      when: _init == 'systemd'

    - name: Ensure singbox is started (OpenRC)
      command: "rc-service {{ singbox_service }} start"
      register: _openrc_start
      changed_when: >-
        'already started' not in (_openrc_start.stdout | default(''))
        and 'started' in (_openrc_start.stdout | default(''))
      when: _init == 'openrc'

    - name: Ensure singbox is started (systemd)
      service:
        name: "{{ singbox_service }}"
        state: started
      when: _init == 'systemd'

    - name: Cleanup download archive
      file:
        path: "/tmp/sing-box-{{ singbox_version }}-{{ target_arch }}-{{ singbox_libc }}.tar.gz"
        state: absent
      when: _need_bin_install | bool

    - name: Read installed version
      command: "{{ singbox_bin }} version"
      register: version_out
      changed_when: false
      failed_when: false

    - name: Check service status (OpenRC)
      command: "rc-service {{ singbox_service }} status"
      register: _svc_status
      changed_when: false
      failed_when: false
      when: _init == 'openrc'

    - name: Check service status (systemd)
      command: "systemctl is-active {{ singbox_service }}"
      register: _svc_status
      changed_when: false
      failed_when: false
      when: _init == 'systemd'

    - name: Deployment summary
      debug:
        msg:
          - "✅ sing-box deployed"
          - "  host:     {{ inventory_hostname }}"
          - "  env:      {{ deployment_env }}"
          - "  os/init:  {{ ansible_os_family | default('?') }} / {{ _init }}"
          - "  version:  {{ singbox_version }}"
          - "  arch:     {{ target_arch }} ({{ singbox_libc }})"
          - "  binary:   {{ singbox_bin }}"
          - "  config:   {{ singbox_config }}"
          - "  detail:   {{ version_out.stdout_lines | default(['n/a']) | first }}"
          - "  service:  {{ _svc_status.stdout | default('n/a') | trim }}"

  handlers:
    - name: Restart singbox (OpenRC)
      listen: Restart singbox
      command: "rc-service {{ singbox_service }} restart"
      when: _init == 'openrc'

    - name: Restart singbox (systemd)
      listen: Restart singbox
      service:
        name: "{{ singbox_service }}"
        state: restarted
      when: _init == 'systemd'
