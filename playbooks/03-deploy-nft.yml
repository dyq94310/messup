---
# 薄封装：下发 private apply.sh + mappings，直接执行（一次性脚本，无 OpenRC）
# mappings: private-config/nft/<deployment_env>/mappings.txt
- name: Deploy nft port-forward on Alpine LXC
  hosts: lxc_nodes
  become: false
  gather_facts: true
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [nft, nat]

  pre_tasks:
    - name: Require deployment_env
      assert:
        that:
          - deployment_env is defined
          - deployment_env | length > 0
        fail_msg: >-
          ❌ Host {{ inventory_hostname }} 缺少 deployment_env。
          请在 inventory 中设置，例如: deployment_env=rear
        success_msg: "deployment_env={{ deployment_env }}"

    - name: Resolve private nft paths
      set_fact:
        _nft_map_src: "{{ private_config_temp }}/nft/{{ deployment_env }}/mappings.txt"
        _nft_apply_src: "{{ private_config_temp }}/nft/apply.sh"

    - name: Ensure apply.sh exists on control node
      stat:
        path: "{{ _nft_apply_src }}"
      delegate_to: localhost
      become: false
      register: _nft_apply_stat

    - name: Ensure mappings exists on control node
      stat:
        path: "{{ _nft_map_src }}"
      delegate_to: localhost
      become: false
      register: _nft_map_stat

    - name: Fail if private nft files missing
      assert:
        that:
          - _nft_apply_stat.stat.exists
          - _nft_apply_stat.stat.isreg
          - _nft_map_stat.stat.exists
          - _nft_map_stat.stat.isreg
        fail_msg: >-
          ❌ 缺少 private nft 文件:
            apply.sh: {{ _nft_apply_src }}
            mappings: {{ _nft_map_src }}
          请确认 messup-private 已软链/checkout 为 private-config，
          且存在 nft/apply.sh 与 nft/{{ deployment_env }}/mappings.txt

  tasks:
    - name: Fail if not Alpine (apk missing)
      fail:
        msg: "❌ {{ inventory_hostname }} 不是 Alpine（未找到 apk）。当前方案仅支持 Alpine LXC。"
      when: ansible_pkg_mgr is defined and ansible_pkg_mgr != 'apk'

    - name: Install nftables, iptables, iproute2 (Alpine)
      apk:
        name:
          - nftables
          - iptables
          - iproute2
        state: present
        update_cache: true

    - name: Preflight nft netlink (needs CAP_NET_ADMIN)
      command: nft list tables
      register: _nft_preflight
      changed_when: false
      failed_when: false

    - name: Fail if nft has no permission
      fail:
        msg: >-
          ❌ nft 无法操作 netlink（{{ _nft_preflight.stderr | default(_nft_preflight.msg) | trim }}）。
          容器/LXC 需 CAP_NET_ADMIN（及通常 CAP_NET_RAW）。
          Proxmox：勿 drop net_admin，重启 CT 后执行 nft list tables 应成功。
      when: _nft_preflight.rc != 0

    - name: Detect default route interface
      shell: |
        set -e
        ip -4 route show default 2>/dev/null \
          | awk '{for (i=1;i<=NF;i++) if ($i=="dev") {print $(i+1); exit}}'
      args:
        executable: /bin/sh
      register: _nft_def_if
      changed_when: false
      failed_when: false

    - name: Fail if default interface unknown and not overridden
      fail:
        msg: >-
          ❌ 无法探测默认路由网卡，且未设置 nft_in_if。
          请在 inventory 设置 nft_in_if / nft_out_if。
      when: >-
        (nft_in_if | default('') | length == 0)
        and (_nft_def_if.stdout | default('') | trim | length == 0)

    - name: Resolve nft interfaces
      set_fact:
        _nft_in_if: "{{ (nft_in_if | default('') | length > 0) | ternary(nft_in_if, _nft_def_if.stdout | trim) }}"
        _nft_out_if: "{{ (nft_out_if | default('') | length > 0) | ternary(nft_out_if, ((nft_in_if | default('') | length > 0) | ternary(nft_in_if, _nft_def_if.stdout | trim))) }}"

    - name: Show nft deploy target
      debug:
        msg: >-
          host={{ inventory_hostname }} env={{ deployment_env }}
          in={{ _nft_in_if }} out={{ _nft_out_if }}
          tc={{ nft_tc_enabled | bool }} rate={{ nft_limit_rate }}
          apply={{ nft_install_dir }}/apply.sh

    - name: Ensure install directory
      file:
        path: "{{ nft_install_dir }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Deploy apply.sh
      copy:
        src: "{{ _nft_apply_src }}"
        dest: "{{ nft_install_dir }}/apply.sh"
        mode: "0755"
        owner: root
        group: root
      register: _nft_apply_copy

    - name: Deploy mappings.txt
      copy:
        src: "{{ _nft_map_src }}"
        dest: "{{ nft_install_dir }}/mappings.txt"
        mode: "0644"
        owner: root
        group: root
      register: _nft_map_copy

    - name: Remove legacy OpenRC unit if present
      file:
        path: "/etc/init.d/{{ nft_service }}"
        state: absent
      register: _nft_legacy_rm

    - name: Disable legacy messup-nft from default runlevel
      command: "rc-update del {{ nft_service }} default"
      register: _nft_legacy_del
      changed_when: _nft_legacy_del.rc == 0
      failed_when: false

    - name: Run apply.sh (one-shot)
      command: "{{ nft_install_dir }}/apply.sh"
      environment:
        IN_IF: "{{ _nft_in_if }}"
        OUT_IF: "{{ _nft_out_if }}"
        CFG: "{{ nft_install_dir }}/mappings.txt"
        LIMIT_RATE: "{{ nft_limit_rate }}"
        MARK: "{{ nft_mark }}"
        TC_ENABLED: "{{ 'yes' if (nft_tc_enabled | bool) else 'no' }}"
      register: _nft_run
      changed_when: true

    - name: Verify nft table
      command: nft list table ip forward
      register: _nft_list
      changed_when: false

    - name: Deployment summary
      debug:
        msg:
          - "✅ nft port-forward applied (one-shot apply.sh, no OpenRC)"
          - "  host:     {{ inventory_hostname }}"
          - "  env:      {{ deployment_env }}"
          - "  in_if:    {{ _nft_in_if }}"
          - "  out_if:   {{ _nft_out_if }}"
          - "  dir:      {{ nft_install_dir }}"
          - "  files:    apply={{ _nft_apply_copy is changed }} map={{ _nft_map_copy is changed }}"
          - "  tc:       {{ nft_tc_enabled | bool }} ({{ nft_limit_rate }})"
          - "  note:     重启后需再跑 Ansible --tags nft（或自行加开机钩子）"
