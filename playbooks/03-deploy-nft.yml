---
# 薄封装：下发 private apply.sh + mappings + OpenRC/systemd oneshot（开机自恢复）
# 支持 Alpine (OpenRC) 与 Debian/Ubuntu (systemd)
# nft 执行失败只警告，不中止该主机后续 play / 整批部署
# mappings: private-config/nft/<deployment_env>/mappings.txt
- name: Deploy nft port-forward on nft nodes
  hosts: nft_nodes
  become: false
  gather_facts: true
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [nft, nat]

  pre_tasks:
    - name: Require deployment_env
      assert:
        that:
          - deployment_env is defined
          - deployment_env | length > 0
        fail_msg: >-
          ❌ Host {{ inventory_hostname }} 缺少 deployment_env。
          请在 inventory 中设置，例如: deployment_env=rear
        success_msg: "deployment_env={{ deployment_env }}"

    - name: Resolve private nft paths
      set_fact:
        _nft_map_src: "{{ private_config_temp }}/nft/{{ deployment_env }}/mappings.txt"
        _nft_apply_src: "{{ private_config_temp }}/nft/apply.sh"
        _nft_ok: true
        _nft_skip_reason: ""

    - name: Ensure apply.sh exists on control node
      stat:
        path: "{{ _nft_apply_src }}"
      delegate_to: localhost
      become: false
      register: _nft_apply_stat

    - name: Ensure mappings exists on control node
      stat:
        path: "{{ _nft_map_src }}"
      delegate_to: localhost
      become: false
      register: _nft_map_stat

    - name: Warn if private nft files missing (skip host nft, do not fail)
      debug:
        msg: >-
          ⚠️  缺少 private nft 文件，跳过本机 nft：
          apply.sh={{ _nft_apply_src }} exists={{ _nft_apply_stat.stat.exists | default(false) }}
          mappings={{ _nft_map_src }} exists={{ _nft_map_stat.stat.exists | default(false) }}
      when: >-
        not (_nft_apply_stat.stat.exists | default(false))
        or not (_nft_map_stat.stat.isreg | default(false))
        or not (_nft_map_stat.stat.exists | default(false))
        or not (_nft_apply_stat.stat.isreg | default(false))

    - name: Mark skip when private files missing
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "private nft files missing"
      when: >-
        not (_nft_apply_stat.stat.exists | default(false))
        or not (_nft_apply_stat.stat.isreg | default(false))
        or not (_nft_map_stat.stat.exists | default(false))
        or not (_nft_map_stat.stat.isreg | default(false))

  tasks:
    - name: Detect package manager
      raw: |
        if command -v apk >/dev/null 2>&1; then
          echo alpine
        elif command -v apt-get >/dev/null 2>&1; then
          echo debian
        else
          echo unknown
        fi
      args:
        executable: /bin/sh
      register: _pkg_mgr_detected
      changed_when: false
      failed_when: false
      when: _nft_ok | bool

    - name: Detect OS / init
      set_fact:
        _is_alpine: "{{ (_pkg_mgr_detected.stdout | default('') | trim) == 'alpine' }}"
        _is_debian: "{{ (_pkg_mgr_detected.stdout | default('') | trim) == 'debian' }}"
      when: _nft_ok | bool

    - name: Resolve init system
      set_fact:
        _init: "{{ 'openrc' if (_is_alpine | bool) else ('systemd' if (_is_debian | bool) else 'unknown') }}"
      when: _nft_ok | bool

    - name: Warn if unsupported OS (skip nft, do not fail host)
      debug:
        msg: >-
          ⚠️  {{ inventory_hostname }} 不支持的系统（需要 Alpine 或 Debian/Ubuntu），跳过 nft。
           os_family={{ ansible_facts['os_family'] | default('?') }} pkg_mgr={{ ansible_facts['pkg_mgr'] | default('?') }}
      when: _nft_ok | bool and _init == 'unknown'

    - name: Mark skip when unsupported OS
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "unsupported OS (need Alpine or Debian/Ubuntu)"
      when: _nft_ok | bool and _init == 'unknown'

    - name: Install nftables, iptables, iproute2 (Alpine)
      apk:
        name:
          - nftables
          - iptables
          - iproute2
        state: present
        update_cache: true
      when: _nft_ok | bool and (_is_alpine | bool)
      register: _nft_pkg
      ignore_errors: true

    - name: Ensure apt module dependencies (Debian)
      raw: |
        set -e
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt ca-certificates
      args:
        executable: /bin/sh
      when: _nft_ok | bool and (_is_debian | bool)
      changed_when: false

    - name: Install nftables, iptables, iproute2 (Debian)
      apt:
        name:
          - nftables
          - iptables
          - iproute2
        state: present
        update_cache: true
      when: _nft_ok | bool and (_is_debian | bool)
      register: _nft_pkg
      ignore_errors: true

    - name: Warn if package install failed
      debug:
        msg: "⚠️  安装 nftables/iptables/iproute2 失败，跳过本机 nft：{{ _nft_pkg.msg | default('unknown') }}"
      when: _nft_ok | bool and _nft_pkg is failed

    - name: Mark skip when package install failed
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "package install failed"
      when: _nft_ok | bool and _nft_pkg is failed

    - name: Preflight nft netlink (needs CAP_NET_ADMIN)
      command: nft list tables
      register: _nft_preflight
      changed_when: false
      failed_when: false
      when: _nft_ok | bool

    - name: Warn if nft has no permission (skip apply, do not fail)
      debug:
        msg: >-
          ⚠️  nft 无法操作 netlink，跳过本机 apply：
          {{ _nft_preflight.stderr | default(_nft_preflight.msg) | default('') | trim }}
           容器/LXC 通常需 CAP_NET_ADMIN（及 CAP_NET_RAW）；KVM 请检查系统防火墙与安全策略。
          Proxmox：勿 drop net_admin，重启 CT 后再跑 --tags nft。
      when: _nft_ok | bool and (_nft_preflight.rc | default(1)) != 0

    - name: Mark skip when nft preflight failed
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "nft netlink permission denied (need CAP_NET_ADMIN)"
      when: _nft_ok | bool and (_nft_preflight.rc | default(1)) != 0

    - name: Detect default route interface
      shell: |
        set -e
        ip -4 route show default 2>/dev/null \
          | awk '{for (i=1;i<=NF;i++) if ($i=="dev") {print $(i+1); exit}}'
      args:
        executable: /bin/sh
      register: _nft_def_if
      changed_when: false
      failed_when: false
      when: _nft_ok | bool

    - name: Warn if default interface unknown and not overridden
      debug:
        msg: "⚠️  无法探测默认路由网卡且未设置 nft_in_if，跳过本机 nft。"
      when: >-
        _nft_ok | bool
        and (nft_in_if | default('') | length == 0)
        and (_nft_def_if.stdout | default('') | trim | length == 0)

    - name: Mark skip when interface unknown
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "no default route iface and nft_in_if unset"
      when: >-
        _nft_ok | bool
        and (nft_in_if | default('') | length == 0)
        and (_nft_def_if.stdout | default('') | trim | length == 0)

    - name: Resolve nft interfaces
      set_fact:
        _nft_in_if: "{{ (nft_in_if | default('') | length > 0) | ternary(nft_in_if, _nft_def_if.stdout | trim) }}"
        _nft_out_if: "{{ (nft_out_if | default('') | length > 0) | ternary(nft_out_if, ((nft_in_if | default('') | length > 0) | ternary(nft_in_if, _nft_def_if.stdout | trim))) }}"
      when: _nft_ok | bool

    - name: Show nft deploy target
      debug:
        msg: >-
          host={{ inventory_hostname }} env={{ deployment_env }}
          init={{ _init }} in={{ _nft_in_if }} out={{ _nft_out_if }}
          tc={{ nft_tc_enabled | bool }} rate={{ nft_limit_rate }}
          apply={{ nft_install_dir }}/apply.sh
      when: _nft_ok | bool

    - name: Ensure install directory
      file:
        path: "{{ nft_install_dir }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      when: _nft_ok | bool
      ignore_errors: true
      register: _nft_dir

    - name: Mark skip when install dir failed
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "cannot create {{ nft_install_dir }}"
      when: _nft_ok | bool and _nft_dir is failed

    - name: Deploy apply.sh
      copy:
        src: "{{ _nft_apply_src }}"
        dest: "{{ nft_install_dir }}/apply.sh"
        mode: "0755"
        owner: root
        group: root
      register: _nft_apply_copy
      when: _nft_ok | bool
      ignore_errors: true

    - name: Deploy mappings.txt
      copy:
        src: "{{ _nft_map_src }}"
        dest: "{{ nft_install_dir }}/mappings.txt"
        mode: "0644"
        owner: root
        group: root
      register: _nft_map_copy
      when: _nft_ok | bool
      ignore_errors: true

    - name: Mark skip when copy failed
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "copy apply.sh/mappings failed"
      when: >-
        _nft_ok | bool
        and (
          (_nft_apply_copy is defined and _nft_apply_copy is failed)
          or (_nft_map_copy is defined and _nft_map_copy is failed)
        )

    - name: Deploy env for apply.sh / service
      template:
        src: "{{ playbook_dir }}/../templates/messup-nft.env.j2"
        dest: "{{ nft_install_dir }}/env"
        mode: "0644"
        owner: root
        group: root
      register: _nft_env
      when: _nft_ok | bool
      ignore_errors: true

    - name: Deploy OpenRC service unit
      template:
        src: "{{ playbook_dir }}/../templates/messup-nft.openrc.j2"
        dest: "/etc/init.d/{{ nft_service }}"
        mode: "0755"
        owner: root
        group: root
      register: _nft_unit
      when: _nft_ok | bool and _init == 'openrc'
      ignore_errors: true

    - name: Deploy systemd service unit
      template:
        src: "{{ playbook_dir }}/../templates/messup-nft.service.j2"
        dest: "/etc/systemd/system/{{ nft_service }}.service"
        mode: "0644"
        owner: root
        group: root
      register: _nft_unit
      when: _nft_ok | bool and _init == 'systemd'
      ignore_errors: true

    - name: Reload systemd after unit change
      systemd:
        daemon_reload: true
      when: >-
        _nft_ok | bool
        and _init == 'systemd'
        and (_nft_unit is defined and _nft_unit is changed and _nft_unit is not failed)
      ignore_errors: true

    - name: Mark skip when env/unit deploy failed
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "deploy env/service unit failed"
      when: >-
        _nft_ok | bool
        and (
          (_nft_env is defined and _nft_env is failed)
          or (_nft_unit is defined and _nft_unit is failed)
        )

    - name: Enable messup-nft (OpenRC default runlevel)
      command: "rc-update add {{ nft_service }} default"
      register: _nft_enable
      changed_when: "'already installed' not in (_nft_enable.stdout | default(''))"
      when: _nft_ok | bool and _init == 'openrc'
      ignore_errors: true

    - name: Enable messup-nft (systemd)
      service:
        name: "{{ nft_service }}"
        enabled: true
      register: _nft_enable
      when: _nft_ok | bool and _init == 'systemd'
      ignore_errors: true

    - name: Apply via service (OpenRC restart = re-run oneshot apply.sh)
      command: "rc-service {{ nft_service }} restart"
      register: _nft_run
      when: _nft_ok | bool and _init == 'openrc'
      ignore_errors: true

    - name: Apply via service (systemd restart = re-run oneshot apply.sh)
      service:
        name: "{{ nft_service }}"
        state: restarted
      register: _nft_run
      when: _nft_ok | bool and _init == 'systemd'
      ignore_errors: true

    - name: Warn if service apply failed
      debug:
        msg: >-
          ⚠️  service {{ nft_service }} enable/restart 失败，不中止部署。
          {{ _nft_run.msg | default('') }}
          stdout: {{ _nft_run.stdout | default('') | trim }}
          stderr: {{ _nft_run.stderr | default('') | trim }}
      when: >-
        _nft_ok | bool
        and (
          (_nft_enable is defined and _nft_enable is failed)
          or (_nft_run is defined and _nft_run is failed)
        )

    - name: Mark apply failed (soft)
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "service enable/restart failed"
      when: >-
        _nft_ok | bool
        and (
          (_nft_enable is defined and _nft_enable is failed)
          or (_nft_run is defined and _nft_run is failed)
        )

    - name: Verify nft table
      command: nft list table ip forward
      register: _nft_list
      changed_when: false
      failed_when: false
      when: _nft_ok | bool

    - name: Warn if verify table failed
      debug:
        msg: "⚠️  nft list table ip forward 失败：{{ _nft_list.stderr | default('') | trim }}"
      when: _nft_ok | bool and (_nft_list.rc | default(1)) != 0

    - name: Mark skip when verify failed
      set_fact:
        _nft_ok: false
        _nft_skip_reason: "nft list table ip forward failed after apply"
      when: _nft_ok | bool and (_nft_list.rc | default(1)) != 0

    - name: Check service status (OpenRC)
      command: "rc-service {{ nft_service }} status"
      register: _nft_svc_status
      changed_when: false
      failed_when: false
      when: _nft_ok | bool and _init == 'openrc'

    - name: Check service status (systemd)
      command: "systemctl is-active {{ nft_service }}"
      register: _nft_svc_status
      changed_when: false
      failed_when: false
      when: _nft_ok | bool and _init == 'systemd'

    - name: Deployment summary (success)
      debug:
        msg:
          - "✅ nft port-forward applied (oneshot, reboot-safe)"
          - "  host:     {{ inventory_hostname }}"
          - "  env:      {{ deployment_env }}"
          - "  os/init:  {{ ansible_facts['os_family'] | default('?') }} / {{ _init }}"
          - "  in_if:    {{ _nft_in_if | default('n/a') }}"
          - "  out_if:   {{ _nft_out_if | default('n/a') }}"
          - "  dir:      {{ nft_install_dir }}"
          - "  service:  {{ nft_service }}"
          - "  status:   {{ _nft_svc_status.stdout | default('n/a') | trim }}"
          - "  tc:       {{ nft_tc_enabled | bool }} ({{ nft_limit_rate }})"
          - "  note:     重启后由 {{ _init }} 自动 apply，无需再跑 Ansible"
      when: _nft_ok | bool

    - name: Deployment summary (skipped / soft-fail)
      debug:
        msg:
          - "⚠️  nft port-forward skipped/soft-failed (pipeline continues)"
          - "  host:     {{ inventory_hostname }}"
          - "  env:      {{ deployment_env | default('n/a') }}"
          - "  reason:   {{ _nft_skip_reason | default('unknown') }}"
      when: not (_nft_ok | bool)
