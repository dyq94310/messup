---
# 一键全量部署：SSH bootstrap → Python → system timezone → SmartDNS → Sing-box → nft
# 用法:
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml --limit <节点名>
#   ansible-playbook playbooks/site.yml --tags singbox
#   ansible-playbook playbooks/site.yml --tags smartdns
#   ansible-playbook playbooks/site.yml --tags nft
#   ansible-playbook playbooks/site.yml --tags singbox,smartdns,nft
# 新机可在 inventory 写 bootstrap_password；密钥优先，失败再用密码装公钥。

- name: Import SSH bootstrap (key or bootstrap_password)
  import_playbook: 00-bootstrap-ssh.yml
  tags: [bootstrap_ssh, bootstrap, always]

- name: Import bootstrap
  import_playbook: 00-bootstrap-python.yml
  tags: [bootstrap, always]

- name: Import system configuration
  import_playbook: 00-configure-system.yml
  tags: [system, timezone]

- name: Import hostname configuration
  import_playbook: 00-configure-hostname.yml
  tags: [system, hostname, hosts]

- name: Import SmartDNS deploy
  import_playbook: 02-deploy-smartdns.yml
  tags: [smartdns, dns]

- name: Import Sing-box deploy
  import_playbook: 01-deploy-singbox.yml
  tags: [singbox, proxy]

- name: Import nft port-forward deploy
  import_playbook: 03-deploy-nft.yml
  tags: [nft, nat]
