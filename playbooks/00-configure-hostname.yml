---
# 将 inventory 别名作为系统 hostname，并仅维护本机 /etc/hosts 映射。
# 不写入其他节点，节点间仍不依赖 /etc/hosts 互访。
- name: Configure system hostname and local hosts entry
  hosts: all_nodes
  gather_facts: false
  become: false
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [system, hostname, hosts]

  tasks:
    - name: Persist system hostname from inventory alias
      ansible.builtin.copy:
        content: "{{ inventory_hostname }}\n"
        dest: /etc/hostname
        owner: root
        group: root
        mode: "0644"
        unsafe_writes: true
      tags: [hostname]

    - name: Try to set current runtime hostname
      ansible.builtin.command:
        argv:
          - hostname
          - "{{ inventory_hostname }}"
      register: runtime_hostname_set
      changed_when: runtime_hostname_set.rc == 0
      failed_when: false
      tags: [hostname]

    - name: Manage local inventory alias in /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        create: true
        marker: "# {mark} ANSIBLE MANAGED NODE ALIAS"
        block: |-
          127.0.1.1 {{ inventory_hostname }}
        owner: root
        group: root
        mode: "0644"
        unsafe_writes: true
      tags: [hosts]

    - name: Read configured system hostname
      ansible.builtin.command: hostname
      register: configured_hostname
      changed_when: false
      tags: [hostname]

    - name: Warn when runtime hostname cannot be changed
      ansible.builtin.debug:
        msg: >-
          ⚠️ 无法修改当前运行时 hostname：期望 {{ inventory_hostname }}，
          实际 {{ configured_hostname.stdout | default('') | trim }}。
          已持久写入 /etc/hostname；常见原因是 LXC 缺少修改 hostname 所需权限。
          请在宿主机或容器配置中设置 hostname。
      tags: [hostname]
      when: (configured_hostname.stdout | trim) != inventory_hostname

    - name: Verify local hosts entry matches inventory alias
      ansible.builtin.command:
        argv:
          - grep
          - -Eq
          - "^127\\.0\\.1\\.1[[:space:]]+{{ inventory_hostname | regex_escape }}([[:space:]]|$)"
          - /etc/hosts
      changed_when: false
      tags: [hosts]

    - name: Show hostname configuration summary
      ansible.builtin.debug:
        msg:
          - "✅ Hostname and local hosts entry configured"
          - "  node:     {{ inventory_hostname }}"
          - "  hostname: {{ configured_hostname.stdout | default('n/a') | trim }}"
          - "  hostname persisted: /etc/hostname"
          - "  runtime hostname rc: {{ runtime_hostname_set.rc | default('unknown') }}"
          - "  hosts:    127.0.1.1 {{ inventory_hostname }}"
      tags: [hostname, hosts]
