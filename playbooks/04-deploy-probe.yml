---
# Deploy a per-host probe command from private inventory host_vars.
# The command itself is secret; only its SHA-256 is persisted on the node.
- name: Deploy probe on managed nodes
  hosts: all_nodes
  gather_facts: false
  become: false
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [probe]
  vars:
    probe_state_dir: /var/lib/messup

  tasks:
    - name: Validate enabled probe configuration
      ansible.builtin.assert:
        that:
          - probe_install_commands is defined
          - probe_install_commands is mapping
          - probe_install_commands | length > 0
        fail_msg: >-
          节点 {{ inventory_hostname }} 已启用 probe，但缺少非空
          probe_install_commands（请在 inventory/host_vars/{{ inventory_hostname }}.yml 配置）。
      when: probe_enabled | default(false) | bool

    - name: Validate probe command names and values
      ansible.builtin.assert:
        that:
          - item.key is match('^[a-z0-9][a-z0-9_-]*$')
          - item.value is string
          - item.value | trim | length > 0
        fail_msg: >-
          节点 {{ inventory_hostname }} 的 probe 命令配置无效：名称必须匹配
          [a-z0-9][a-z0-9_-]*，命令不能为空。
      loop: "{{ probe_install_commands | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: probe_enabled | default(false) | bool
      no_log: true

    - name: Ensure probe state directory exists
      ansible.builtin.file:
        path: "{{ probe_state_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: probe_enabled | default(false) | bool

    - name: Install or update named probes from private commands
      ansible.builtin.shell: |
        set -eu
        state_file="{{ probe_state_dir }}/{{ item.key }}.sha256"
        desired_hash="{{ item.value | hash('sha256') }}"
        current_hash="$(cat "$state_file" 2>/dev/null || true)"

        if [ "$current_hash" = "$desired_hash" ]; then
          echo "probe_unchanged"
          exit 0
        fi

        {{ item.value }}
        printf '%s\n' "$desired_hash" > "$state_file"
        echo "probe_updated"
      args:
        executable: /bin/sh
      register: probe_command_run
      changed_when: "'probe_updated' in (probe_command_run.stdout | default(''))"
      when:
        - probe_enabled | default(false) | bool
      loop: "{{ probe_install_commands | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Report named probe deployment status
      ansible.builtin.debug:
        msg: "probe {{ item.item.key }} {{ 'installed or updated' if item.changed else 'unchanged, skipped' }} on {{ inventory_hostname }}"
      loop: "{{ probe_command_run.results | default([]) }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: probe_enabled | default(false) | bool
