---
# 首次 SSH 引导：优先密钥；密钥失败（或 inventory 含 bootstrap_password）时用密码装公钥。
# 控制机依赖 sshpass（CI 会 apt 安装；本 playbook 也会检测并尝试补装）。
#
# inventory 示例:
#   10.0.0.30 ansible_port=22 deployment_env=node-b bootstrap_password=面板初始密码
# 成功后请从 inventory 删除 bootstrap_password=...
#
# 注意:
# - 密码阶段必须禁用 ControlMaster / 私钥，否则会复用密钥探测失败的 SSH 会话或只试公钥
# - 公钥由私钥 ssh-keygen -y 导出（与 ANSIBLE_SSH_KEY / id_ed25519_github 对应）

- name: Probe key auth and classify hosts
  hosts: lxc_nodes
  gather_facts: false
  become: false
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [bootstrap_ssh, bootstrap, always]
  vars:
    bootstrap_ssh_privkey: "{{ ansible_ssh_private_key_file | default('~/.ssh/id_ed25519_github') | expanduser }}"
    # 禁用 ControlMaster，避免与后续密码会话串扰
    ansible_ssh_common_args: >-
      -o PreferredAuthentications=publickey
      -o PasswordAuthentication=no
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o ConnectTimeout=12
      -o IdentitiesOnly=yes
      -o ControlMaster=no
      -o ControlPath=none
  tasks:
    - name: Derive public key from private key on control node
      shell: ssh-keygen -y -f "{{ bootstrap_ssh_privkey }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false
      register: pubkey_export
      no_log: true

    - name: Fail when private key cannot export public key
      fail:
        msg: >-
          无法从 {{ bootstrap_ssh_privkey }} 导出公钥（ssh-keygen -y）。
          CI 请确认 Secret ANSIBLE_SSH_KEY 为有效私钥全文。
      run_once: true
      when: pubkey_export.rc | default(1) != 0

    - name: Store exported public key
      set_fact:
        bootstrap_ssh_pubkey: "{{ pubkey_export.stdout | trim }}"
      run_once: true
      no_log: true

    - name: Probe SSH with private key
      raw: echo __KEY_OK__
      args:
        executable: /bin/sh
      register: key_probe
      changed_when: false
      failed_when: false

    - name: Evaluate key probe result
      set_fact:
        ssh_key_ok: >-
          {{
            not (key_probe.unreachable | default(false) | bool)
            and ((key_probe.rc | default(1)) | int == 0)
            and ('__KEY_OK__' in (key_probe.stdout | default('')))
          }}
        has_bootstrap_password: >-
          {{
            bootstrap_password is defined
            and (bootstrap_password | string | length) > 0
          }}

    - name: Show probe status (no secrets)
      debug:
        msg: >-
          {{ inventory_hostname }} key_ok={{ ssh_key_ok }}
          has_bootstrap_password={{ has_bootstrap_password }}

    # 仅密钥失败 + 有密码 → 密码装钥（密钥已通时勿再走密码；sshd 可能已关 PasswordAuthentication）
    - name: Mark hosts that need password bootstrap
      group_by:
        key: needs_ssh_bootstrap
      when:
        - not (ssh_key_ok | bool)
        - has_bootstrap_password | bool

    - name: Warn key failed without bootstrap_password
      debug:
        msg: >-
          ⚠️  {{ inventory_hostname }} 密钥不可用且未设置 bootstrap_password，
          将跳过该主机。在 inventory 增加 bootstrap_password=... 后重新部署。
      when:
        - not (ssh_key_ok | bool)
        - not (has_bootstrap_password | bool)

    - name: Remind remove bootstrap_password when key already works
      debug:
        msg: >-
          ℹ️  {{ inventory_hostname }} 密钥已可用，请从 inventory 删除 bootstrap_password。
      when:
        - ssh_key_ok | bool
        - has_bootstrap_password | bool

- name: Install pubkey via bootstrap_password
  hosts: needs_ssh_bootstrap
  gather_facts: false
  become: false
  # 密码装钥失败必须可见，不能静默跳过
  ignore_unreachable: false
  any_errors_fatal: false
  tags: [bootstrap_ssh, bootstrap, always]
  vars:
    # 必须与 ansible_ssh_private_key_file=/dev/null 脱钩：同 play 延迟求值会把
    # "{{ ansible_ssh_private_key_file }}" 解析成 /dev/null，ssh-keygen -y 必失败。
    # CI/本地均写入 ~/.ssh/id_ed25519_github（见 workflow --private-key / inventory）。
    bootstrap_ssh_privkey: "{{ '~/.ssh/id_ed25519_github' | expanduser }}"
    # 密码阶段：只用密码，禁用公钥与 ControlMaster
    ansible_password: "{{ bootstrap_password }}"
    ansible_ssh_private_key_file: /dev/null
    ansible_ssh_common_args: >-
      -o PreferredAuthentications=password
      -o PubkeyAuthentication=no
      -o KbdInteractiveAuthentication=no
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o NumberOfPasswordPrompts=1
      -o ConnectTimeout=15
      -o IdentitiesOnly=yes
      -o IdentityFile=/dev/null
      -o ControlMaster=no
      -o ControlPath=none
      -o ControlPersist=no
  tasks:
    - name: Check sshpass on control node
      shell: command -v sshpass
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false
      failed_when: false
      register: sshpass_check

    - name: Install sshpass on control node if missing
      shell: |
        set -e
        if command -v sshpass >/dev/null 2>&1; then
          echo __SSHPASS_OK__
          exit 0
        fi
        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq sshpass
        elif command -v apk >/dev/null 2>&1; then
          sudo apk add --no-cache sshpass 2>/dev/null || apk add --no-cache sshpass
        elif command -v dnf >/dev/null 2>&1; then
          sudo dnf install -y sshpass
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y sshpass
        else
          echo "unsupported package manager" >&2
          exit 1
        fi
        command -v sshpass
        echo __SSHPASS_INSTALLED__
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      when: sshpass_check.rc | default(1) != 0
      register: sshpass_install
      failed_when: false
      changed_when: >-
        sshpass_install.stdout is defined and '__SSHPASS_INSTALLED__' in sshpass_install.stdout

    - name: Re-check sshpass after optional install
      shell: command -v sshpass
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false
      failed_when: false
      register: sshpass_recheck

    - name: Fail when sshpass still missing on control node
      fail:
        msg: >-
          控制机未安装 sshpass，无法用 bootstrap_password 登录。
          CI 应已 apt install sshpass；本地请执行: sudo apt-get install -y sshpass
      run_once: true
      when: sshpass_recheck.rc | default(1) != 0

    - name: Export public key for password install
      shell: ssh-keygen -y -f "{{ bootstrap_ssh_privkey }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false
      register: pubkey_for_install
      no_log: true
      failed_when: false

    - name: Fail when private key cannot export public key
      fail:
        msg: >-
          无法从 {{ bootstrap_ssh_privkey }} 导出公钥（ssh-keygen -y）。
          请确认 CI Secret ANSIBLE_SSH_KEY 已写入该路径，且为有效私钥。
      run_once: true
      when: pubkey_for_install.rc | default(1) != 0

    - name: Fail when public key export empty
      fail:
        msg: 无法导出公钥，拒绝写入 authorized_keys
      run_once: true
      when: (pubkey_for_install.stdout | default('') | trim | length) == 0

    - name: Install authorized_keys with password auth
      raw: |
        set -e
        mkdir -p /root/.ssh
        chmod 700 /root/.ssh
        touch /root/.ssh/authorized_keys
        chmod 600 /root/.ssh/authorized_keys
        PUB='{{ pubkey_for_install.stdout | trim }}'
        if [ -z "$PUB" ]; then
          echo __KEY_EMPTY__
          exit 1
        fi
        if grep -qxF "$PUB" /root/.ssh/authorized_keys 2>/dev/null; then
          echo __KEY_PRESENT__
        else
          printf '%s\n' "$PUB" >> /root/.ssh/authorized_keys
          echo __KEY_INSTALLED__
        fi
        # 确认写入
        if ! grep -qxF "$PUB" /root/.ssh/authorized_keys 2>/dev/null; then
          echo __KEY_WRITE_FAILED__
          exit 1
        fi
      args:
        executable: /bin/sh
      register: key_install
      # 不 no_log 整段：需要看到 __KEY_INSTALLED__ / 连接错误；密码在 ansible_password 侧
      changed_when: >-
        key_install.stdout is defined and '__KEY_INSTALLED__' in key_install.stdout
      failed_when: >-
        (key_install.rc | default(1) | int != 0)
        or (key_install.stdout is not defined)
        or (
          '__KEY_INSTALLED__' not in key_install.stdout
          and '__KEY_PRESENT__' not in key_install.stdout
        )

    - name: Report key install result
      debug:
        msg: >-
          ✅ {{ inventory_hostname }} authorized_keys
          {{ '已写入' if ('__KEY_INSTALLED__' in (key_install.stdout | default(''))) else '已存在' }}

- name: Verify key auth after password bootstrap
  hosts: needs_ssh_bootstrap
  gather_facts: false
  become: false
  ignore_unreachable: false
  any_errors_fatal: false
  tags: [bootstrap_ssh, bootstrap, always]
  vars:
    ansible_ssh_common_args: >-
      -o PreferredAuthentications=publickey
      -o PasswordAuthentication=no
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o ConnectTimeout=12
      -o IdentitiesOnly=yes
      -o ControlMaster=no
      -o ControlPath=none
  tasks:
    - name: Re-probe SSH with private key
      raw: echo __KEY_OK__
      args:
        executable: /bin/sh
      register: key_verify
      changed_when: false
      failed_when: >-
        (key_verify.unreachable | default(false) | bool)
        or ((key_verify.rc | default(1)) | int != 0)
        or ('__KEY_OK__' not in (key_verify.stdout | default('')))

    - name: Confirm key login after bootstrap
      debug:
        msg: "✅ {{ inventory_hostname }} 密钥登录复核成功"

    # 勿 passwd -l root：Alpine/OpenSSH+PAM 下会锁死账号，公钥也会 Permission denied。
    # 仅关密码登录（sshd），并在改配置后再复核一次密钥。
    - name: Disable password authentication in sshd
      raw: |
        set -e
        conf=/etc/ssh/sshd_config
        if [ ! -f "$conf" ]; then
          echo __SSHD_CONF_MISSING__
          exit 0
        fi
        changed=0
        ensure_kv() {
          key="$1"
          val="$2"
          if grep -qiE "^[[:space:]]*${key}[[:space:]]+" "$conf" 2>/dev/null; then
            if ! grep -qiE "^[[:space:]]*${key}[[:space:]]+${val}([[:space:]]|$)" "$conf" 2>/dev/null; then
              sed -i -E "s|^[[:space:]]*${key}[[:space:]]+.*|${key} ${val}|" "$conf"
              changed=1
            fi
          else
            printf '\n%s %s\n' "$key" "$val" >> "$conf"
            changed=1
          fi
        }
        ensure_kv PasswordAuthentication no
        ensure_kv KbdInteractiveAuthentication no
        ensure_kv ChallengeResponseAuthentication no
        ensure_kv PermitRootLogin prohibit-password
        if [ "$changed" -eq 1 ]; then
          if command -v rc-service >/dev/null 2>&1; then
            rc-service sshd reload 2>/dev/null || rc-service sshd restart 2>/dev/null || true
          elif command -v systemctl >/dev/null 2>&1; then
            systemctl reload sshd 2>/dev/null || systemctl reload ssh 2>/dev/null \
              || systemctl restart sshd 2>/dev/null || systemctl restart ssh 2>/dev/null || true
          elif command -v service >/dev/null 2>&1; then
            service sshd reload 2>/dev/null || service ssh reload 2>/dev/null \
              || service sshd restart 2>/dev/null || true
          fi
          echo __SSHD_PW_DISABLED__
        else
          echo __SSHD_PW_ALREADY__
        fi
      args:
        executable: /bin/sh
      register: sshd_pw
      changed_when: >-
        sshd_pw.stdout is defined and '__SSHD_PW_DISABLED__' in sshd_pw.stdout
      failed_when: false

    - name: Re-probe key auth after sshd harden
      raw: echo __KEY_OK__
      args:
        executable: /bin/sh
      register: key_verify_after_harden
      changed_when: false
      failed_when: >-
        (key_verify_after_harden.unreachable | default(false) | bool)
        or ((key_verify_after_harden.rc | default(1)) | int != 0)
        or ('__KEY_OK__' not in (key_verify_after_harden.stdout | default('')))

    - name: Note bootstrap password cleanup
      debug:
        msg: >-
          ✅ {{ inventory_hostname }} 公钥已就绪；已尝试关闭 sshd 密码登录（未 passwd -l）。
          请从 inventory 删除 bootstrap_password 字段后提交。
