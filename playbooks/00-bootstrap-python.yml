---
# Bootstrap：为最小化 Alpine/Debian LXC 安装 Python3（Ansible 模块依赖）
# 使用 raw 模块，无需目标机已有 Python
- name: Bootstrap Python on LXC
  hosts: lxc_nodes
  gather_facts: false
  become: false
  # 某台不可达只跳过该主机，不中止整批部署
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [bootstrap]

  tasks:
    - name: Detect package manager
      raw: |
        if [ -x "$(command -v apk)" ]; then
          echo "alpine"
        elif [ -x "$(command -v apt-get)" ]; then
          echo "debian"
        else
          echo "unknown"
        fi
      args:
        executable: /bin/sh
      register: os_check
      changed_when: false
      failed_when: false

    - name: Fail on unsupported OS
      fail:
        msg: >-
          ❌ 不支持的目标系统（需要 apk 或 apt-get）。
          检测结果: {{ os_check.stdout | default('') | trim | default('empty') }}
          主机: {{ inventory_hostname }}
      when: os_check.rc is defined and (os_check.rc != 0 or 'unknown' in (os_check.stdout | default('')))

    - name: "[Alpine] Install Python3 + ca-certificates via raw"
      raw: |
        set -e
        apk update
        apk add --no-cache python3 ca-certificates
      args:
        executable: /bin/sh
      when: "'alpine' in (os_check.stdout | default(''))"
      register: alpine_py
      changed_when: >-
        alpine_py.stdout is defined and (
          'Installing' in alpine_py.stdout or
          'OK:' in alpine_py.stdout or
          'Upgrading' in alpine_py.stdout
        )

    - name: "[Debian] Install Python3 + python3-apt via raw"
      raw: |
        set -e
        apt-get update
        # python3-apt：Ansible apt 模块依赖；极简 Debian 无此包会自举失败 (cmd: update ENOENT)
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt ca-certificates
      args:
        executable: /bin/bash
      when: "'debian' in (os_check.stdout | default(''))"
      register: debian_py
      changed_when: >-
        debian_py.stdout is defined and (
          'Setting up' in debian_py.stdout or
          'Unpacking' in debian_py.stdout
        )

    - name: Brief settle after package install
      pause:
        seconds: 2
      when: >
        (alpine_py is defined and alpine_py is changed) or
        (debian_py is defined and debian_py is changed)

    - name: Verify Python3
      raw: python3 --version
      args:
        executable: /bin/sh
      register: python_version
      changed_when: false
      failed_when: python_version.rc != 0

    # auto_silent 会按控制端版本探测 /usr/bin/python3.13 等，目标机常只有 /usr/bin/python3
    - name: Resolve python3 absolute path
      raw: command -v python3
      args:
        executable: /bin/sh
      register: python_path
      changed_when: false
      failed_when: >-
        (python_path.rc | default(1) | int != 0)
        or ((python_path.stdout | default('') | trim | length) == 0)

    - name: Pin ansible_python_interpreter to real python3
      set_fact:
        ansible_python_interpreter: "{{ python_path.stdout | trim }}"

    - name: Show Python version
      debug:
        msg: >-
          ✅ Python ready on {{ inventory_hostname }}:
          {{ python_version.stdout | trim }}
          (interpreter={{ ansible_python_interpreter }})
