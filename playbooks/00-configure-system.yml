---
# 基础系统配置：统一所有节点时区。
# 只使用 ansible-core 内置模块，不依赖额外 collection。
- name: Configure system timezone
  hosts: all_nodes
  gather_facts: true
  become: false
  ignore_unreachable: true
  any_errors_fatal: false
  tags: [system, timezone]
  vars:
    system_timezone: "Asia/Shanghai"

  tasks:
    - name: Detect package manager
      raw: |
        if command -v apk >/dev/null 2>&1; then
          echo alpine
        elif command -v apt-get >/dev/null 2>&1; then
          echo debian
        else
          echo unknown
        fi
      args:
        executable: /bin/sh
      register: _timezone_pkg_mgr
      changed_when: false
      failed_when: false

    - name: Fail on unsupported package manager
      fail:
        msg: >-
          ❌ 无法配置 {{ system_timezone }}：只支持 Alpine(apk) 或 Debian/Ubuntu(apt-get)，
          检测结果={{ _timezone_pkg_mgr.stdout | default('') | trim }}。
      when: (_timezone_pkg_mgr.stdout | default('') | trim) not in ['alpine', 'debian']

    - name: Install timezone database (Alpine)
      apk:
        name: tzdata
        state: present
      when: (_timezone_pkg_mgr.stdout | default('') | trim) == 'alpine'

    - name: Install timezone database (Debian)
      apt:
        name: tzdata
        state: present
        update_cache: true
      when: (_timezone_pkg_mgr.stdout | default('') | trim) == 'debian'

    - name: Link system localtime
      file:
        src: "/usr/share/zoneinfo/{{ system_timezone }}"
        dest: /etc/localtime
        state: link
        force: true

    - name: Write timezone name
      copy:
        content: "{{ system_timezone }}\n"
        dest: /etc/timezone
        mode: "0644"

    - name: Show configured timezone
      command: date +%Z
      register: timezone_name
      changed_when: false

    - name: Show timezone summary
      debug:
        msg:
          - "✅ System timezone configured"
          - "  host:     {{ inventory_hostname }}"
          - "  timezone: {{ system_timezone }}"
          - "  current:  {{ timezone_name.stdout | default('n/a') | trim }}"
